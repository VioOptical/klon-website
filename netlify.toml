[build]
  publish = "."
  command = ""

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/solusi-mata-minus-vio-google-jbk/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/terapi-mata-minus-ortho-k-jabodetabek-ard/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/solusi-mata-minus-vio-google-jbk"
  to = "/solusi-mata-minus-vio-google-jbk/"
  status = 301

[[redirects]]
  from = "/terapi-mata-minus-ortho-k-jabodetabek-ard"
  to = "/terapi-mata-minus-ortho-k-jabodetabek-ard/"
  status = 301
